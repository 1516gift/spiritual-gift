<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사역 스타일 진단</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FBF1E6;
            --surface: #FFFFFF;
            --surface-soft: #FFF7EE;
            --ink: #2A1F1A;
            --ink-mid: #5C4A3D;
            --ink-muted: #9C8676;
            --line: #EFE2D2;
            --line-soft: #F6EBDC;
            --accent: #C66E47;
            --accent-deep: #A85428;
            --accent-soft: #FCE5D0;
            --accent-bg: #FFEDDB;
            --brand: #7c3aed;
            --brand-light: #a78bfa;
            --brand-deep: #5b21b6;
            --brand-soft: #EBE0FF;
            --brand-bg: #F4EEFF;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--ink);
            margin: 0;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 480px; margin: 0 auto; padding: 1.5rem; min-height: 100vh; display: flex; flex-direction: column; }
        main { flex: 1; }
        section { display: none; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        h1, h2 { font-weight: 800; letter-spacing: -0.02em; color: var(--ink); margin: 0; }
        .label-tiny { font-size: 10px; font-weight: 800; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-muted); }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding-top: 0.5rem; }
        .progress-text { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; color: var(--ink-muted); text-transform: uppercase; }
        .progress-bar { width: 100%; height: 3px; background: var(--line); border-radius: 2px; overflow: hidden; margin-bottom: 1.75rem; }
        .progress-bar > div { height: 100%; background: var(--brand); transition: width 0.5s ease; }
        .back-btn { background: none; border: none; font-size: 11px; font-weight: 700; color: var(--ink-muted); letter-spacing: 0.08em; cursor: pointer; padding: 0.25rem 0.5rem; margin-left: -0.5rem; font-family: inherit; }
        .back-btn:hover { color: var(--brand); }

        .card { background: var(--surface); border: 1px solid var(--line); border-radius: 18px; padding: 1.5rem; }
        .btn { width: 100%; padding: 1.05rem 1.25rem; border-radius: 12px; font-weight: 700; font-size: 0.95rem; border: none; cursor: pointer; transition: all 0.15s; font-family: inherit; }
        .btn-primary { background: var(--ink); color: var(--surface); }
        .btn-primary:hover { background: #1a1310; }
        .btn-primary:active { transform: scale(0.99); }
        .btn-secondary { background: var(--surface); color: var(--ink); border: 1px solid var(--line); }

        .scale-row { display: flex; justify-content: space-between; align-items: center; gap: 0.4rem; position: relative; padding: 1rem 0; }
        .scale-row::before { content: ''; position: absolute; top: 50%; left: 24px; right: 24px; height: 1px; background: var(--line); z-index: 0; }
        .scale-btn { width: 48px; height: 48px; border-radius: 50%; border: 1px solid var(--line); background: var(--surface); font-weight: 700; color: var(--ink-muted); cursor: pointer; position: relative; z-index: 1; font-size: 0.95rem; font-family: inherit; transition: all 0.2s; }
        .scale-btn:hover { border-color: var(--brand); color: var(--brand); }
        .scale-btn.active { background: var(--ink); color: var(--surface); border-color: var(--ink); transform: scale(1.1); }
        .scale-labels { display: flex; justify-content: space-between; margin-top: 0.75rem; font-size: 0.78rem; font-weight: 700; color: var(--ink-mid); padding: 0 4px; }

        .result-card { background: var(--brand-bg); border: 1px solid var(--brand-soft); border-radius: 18px; padding: 2rem 1.5rem; margin-bottom: 1.5rem; text-align: center; }
        .result-row { padding: 1rem 0; }
        .result-row + .result-row { border-top: 1px solid var(--brand-soft); }
        .result-label { font-size: 0.72rem; font-weight: 800; color: var(--brand); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 0.5rem; }
        .result-type { font-size: 1.8rem; font-weight: 900; color: var(--brand-deep); letter-spacing: -0.02em; line-height: 1.1; margin: 0; }
        .result-score { display: inline-block; margin-left: 0.5rem; font-size: 1.2rem; font-weight: 700; color: var(--brand); }

        .brand-logo { padding: 2.5rem 0 1rem; text-align: center; }
        .brand-logo .logo-row { display: inline-flex; align-items: center; gap: 8px; mix-blend-mode: multiply; }
        .brand-logo .logo-tent, .brand-logo .logo-text { height: 28px; width: auto; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <header id="ui-header" style="display:none">
            <div class="top-bar">
                <button class="back-btn" onclick="goPrev()">← 이전</button>
                <div class="progress-text" id="ui-zt"></div>
                <span class="progress-text" id="ui-idx-now">0/14</span>
            </div>
            <div class="progress-bar"><div id="ui-bar" style="width:0%"></div></div>
        </header>

        <main>
            <!-- Intro -->
            <section id="scr-intro" class="fade-in" style="padding-top: 4rem; text-align: center;">
                <div style="font-size: 0.82rem; font-weight: 700; letter-spacing: 0.04em; color: var(--brand); margin-bottom: 1.25rem;">사역 스타일 진단</div>
                <h1 style="font-size: clamp(1.5rem, 5.5vw, 1.95rem); line-height: 1.3; margin-bottom: 1.5rem;">나의 사역 스타일<br>발견</h1>
                <div style="background: var(--brand-bg); border-radius: 18px; padding: 1.75rem; margin: 0 0 2rem; text-align: left; border: 1px solid var(--brand-soft);">
                    <p style="font-size: 0.92rem; line-height: 1.75; color: var(--ink-mid); margin: 0;">14개 문항을 통해 두 축의 사역 스타일을 확인합니다:<br><br><b>일 중심 ↔ 관계 중심</b><br><b>유연한 ↔ 체계적</b></p>
                </div>
                <button onclick="startQuiz()" class="btn btn-primary">테스트 시작하기 →</button>
            </section>

            <!-- Quiz -->
            <section id="scr-quiz" class="fade-in">
                <div class="label-tiny" id="ui-style-cat" style="margin-bottom: 0.5rem;">STYLE</div>
                <h2 id="style-q-text" style="font-size: 1.1rem; line-height: 1.65; font-weight: 700; margin-bottom: 2rem;"></h2>
                <div class="card" style="padding: 1.5rem;">
                    <div class="scale-row">
                        <button onclick="pickStyle(1)" class="scale-btn" id="s1">1</button>
                        <button onclick="pickStyle(2)" class="scale-btn" id="s2">2</button>
                        <button onclick="pickStyle(3)" class="scale-btn" id="s3">3</button>
                        <button onclick="pickStyle(4)" class="scale-btn" id="s4">4</button>
                        <button onclick="pickStyle(5)" class="scale-btn" id="s5">5</button>
                    </div>
                    <div class="scale-labels">
                        <span id="style-left-label"></span>
                        <span id="style-right-label"></span>
                    </div>
                </div>
            </section>

            <!-- Result -->
            <section id="scr-result" class="fade-in" style="padding-top: 1rem;">
                <div class="label-tiny" style="margin-bottom: 0.5rem; text-align: center;">RESULT</div>
                <h2 style="font-size: 1.6rem; margin-bottom: 1.5rem; text-align: center;">나의 사역 스타일</h2>
                <div class="result-card">
                    <div class="result-row">
                        <div class="result-label">에너지 방향</div>
                        <p class="result-type"><span id="res-e-type"></span><span class="result-score" id="res-e-score"></span></p>
                    </div>
                    <div class="result-row">
                        <div class="result-label">업무 스타일</div>
                        <p class="result-type"><span id="res-o-type"></span><span class="result-score" id="res-o-score"></span></p>
                    </div>
                </div>
                <p style="font-size: 0.78rem; color: var(--ink-muted); text-align: center; line-height: 1.7; margin: 0 0 2rem;">각 축 7점에서 35점 범위 · 21점이 중립</p>
                <button onclick="resetTest()" class="btn btn-secondary">다시 하기</button>
            </section>
        </main>

            {t:"업무 방식", q:"작업을 진행하시는 방식은 어떠신가요?", l:"상황 따라", r:"계획 순서"},
            {t:"업무 방식", q:"선호하시는 업무 스타일은 어떠신가요?", l:"다양한 일", r:"꾸준한 일"},
            {t:"업무 방식", q:"무엇을 결정하실 때 어떤 성향이신가요?", l:"여지 남김", r:"결말 지음"},
            {t:"업무 방식", q:"일을 하실 때 더 중요하게 여기시는 점은?", l:"임기응변", r:"규칙/절차"},
            {t:"업무 방식", q:"반복되는 일상 업무에 대한 느낌은?", l:"싫증 느낌", r:"편안함 느낌"},
            {t:"에너지 획득", q:"어느 때 더 편안함을 느끼시나요?", l:"혼자 작업", r:"사람 교제"},
            {t:"에너지 획득", q:"사역에 집중하실 때의 주된 방향은?", l:"목표 중심", r:"관계 중심"},
            {t:"에너지 획득", q:"사역의 열정이 생기는 계기는 무엇인가요?", l:"명분 이행", r:"조직 형성"},
            {t:"에너지 획득", q:"최고의 성취감을 느끼는 순간은?", l:"일 완성", r:"관계 형성"},
            {t:"에너지 획득", q:"회의가 시작되는 시점에 대한 생각은?", l:"정해진 시간", r:"사람 모임"},
            {t:"에너지 획득", q:"업무 시 더 큰 염려가 되는 부분은?", l:"마감 준수", r:"관계 유지"},
            {t:"에너지 획득", q:"사역에서 더 핵심으로 여기시는 것은?", l:"완성도", r:"대화/공감"}
        ];

        let s_cur = 0;
        let s_ans = new Array(14).fill(0);
        const STORAGE_KEY = 'sg_style_only_v1';

        function saveState() {
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ s_cur, s_ans })); } catch(e) {}
        }
        function loadState() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if(!raw) return false;
                const s = JSON.parse(raw);
                s_cur = s.s_cur || 0;
                s_ans = s.s_ans || new Array(14).fill(0);
                return true;
            } catch(e) { return false; }
        }
        function clearState() { try { localStorage.removeItem(STORAGE_KEY); } catch(e) {} }

        function showPage(id) {
            document.querySelectorAll('section').forEach(s => s.style.display = 'none');
            const el = document.getElementById(id);
            if(el) { el.style.display = 'block'; window.scrollTo(0,0); }
            document.getElementById('ui-header').style.display = (id === 'scr-quiz') ? 'block' : 'none';
        }

        function startQuiz() {
            clearState();
            s_cur = 0;
            s_ans = new Array(14).fill(0);
            renderQuiz();
            showPage('scr-quiz');
        }

        function renderQuiz() {
            const q = STYLE_Q[s_cur];
            document.getElementById('style-q-text').innerText = q.q;
            document.getElementById('ui-style-cat').innerText = q.t.toUpperCase();
            document.getElementById('style-left-label').innerText = q.l;
            document.getElementById('style-right-label').innerText = q.r;
            document.getElementById('ui-idx-now').innerText = `${s_cur+1}/14`;
            document.getElementById('ui-bar').style.width = (s_cur+1)/14*100+'%';
            document.querySelectorAll('.scale-btn').forEach(b => b.classList.remove('active'));
            if(s_ans[s_cur] > 0) document.getElementById('s' + s_ans[s_cur]).classList.add('active');
        }

        function pickStyle(v) {
            s_ans[s_cur] = v;
            document.querySelectorAll('.scale-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('s' + v).classList.add('active');
            saveState();
            setTimeout(() => {
                if(s_cur < 13) { s_cur++; renderQuiz(); }
                else { finish(); }
            }, 220);
        }

        function finish() {
            const eScore = s_ans.slice(7, 14).reduce((a, b) => a + b, 0);
            const oScore = s_ans.slice(0, 7).reduce((a, b) => a + b, 0);
            const eType = eScore > 21 ? '관계 중심' : eScore < 21 ? '일 중심' : '중립적';
            const oType = oScore > 21 ? '체계적' : oScore < 21 ? '유연한' : '중립적';

            document.getElementById('res-e-type').innerText = eType;
            document.getElementById('res-e-score').innerText = `(${eScore}점)`;
            document.getElementById('res-o-type').innerText = oType;
            document.getElementById('res-o-score').innerText = `(${oScore}점)`;

            showPage('scr-result');
        }

        function resetTest() {
            if(!confirm('다시 시작하시겠습니까?')) return;
            clearState();
            s_cur = 0;
            s_ans = new Array(14).fill(0);
            showPage('scr-intro');
        }

        function goPrev() {
            if(s_cur > 0) { s_cur--; renderQuiz(); }
            else { showPage('scr-intro'); }
            saveState();
        }

        // Init
        if(loadState() && s_cur > 0 && s_cur < 14) {
            if(confirm('이전 진행 상태가 있습니다. 이어서 진행하시겠습니까?')) {
                renderQuiz();
                showPage('scr-quiz');
            } else {
                clearState();
                s_cur = 0;
                s_ans = new Array(14).fill(0);
                showPage('scr-intro');
            }
        } else {
            showPage('scr-intro');
        }
    </script>
</body>
</html>
